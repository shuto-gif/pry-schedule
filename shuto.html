<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuto — PRY 週間スケジュール v10</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--surface:#141418;--surface2:#1c1c22;--border:#2a2a33;--text:#e8e6e3;--text-dim:#8a8892;--pry:#c9a84c;--pry-dim:rgba(201,168,76,0.18);--design:#5b8def;--design-dim:rgba(91,141,239,0.18);--yt:#e85d5d;--yt-dim:rgba(232,93,93,0.18);--live:#ff3d3d;--live-dim:rgba(255,61,61,0.22);--notify:#f0a030;--notify-dim:rgba(240,160,48,0.18);--board:#7c6fe0;--board-dim:rgba(124,111,224,0.2);--off:#2a2a33;--off-dim:rgba(42,42,51,0.5);--rest:#444;--rest-dim:rgba(68,68,68,0.35);--mtg:#d97706;--mtg-dim:rgba(217,119,6,0.18)}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
.header{padding:16px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:16px}.header h1{font-size:16px;font-weight:800;letter-spacing:.08em;color:var(--pry)}.header .ver{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);background:var(--surface2);padding:2px 8px;border-radius:4px}
.nav{padding:8px 20px;display:flex;gap:12px;border-bottom:1px solid var(--border)}.nav a{font-size:10px;color:var(--text-dim);text-decoration:none;padding:3px 10px;border-radius:4px;border:1px solid var(--border)}.nav a:hover,.nav a.active{color:var(--pry);border-color:var(--pry)}
.legend{padding:8px 20px;display:flex;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--border)}.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-dim)}.legend-dot{width:8px;height:8px;border-radius:2px}
.container{padding:10px 8px 16px;overflow-x:auto}
.timetable{display:grid;grid-template-columns:38px repeat(7,1fr)}.time-col{position:relative}.time-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-dim);position:absolute;right:4px;transform:translateY(-4px)}.day-col{border-left:1px solid var(--border)}.day-hdr{padding:5px 4px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}.day-name{font-size:11px;font-weight:800;letter-spacing:.04em}.day-theme{font-size:8px;font-weight:300;color:var(--text-dim);margin-top:1px}.day-body{position:relative}.hline{position:absolute;left:0;right:0;height:1px;background:var(--border);opacity:.35}
.ev{position:absolute;left:2px;right:2px;border-radius:3px;padding:2px 4px;font-size:8px;line-height:1.25;overflow:hidden;border-left:2px solid;transition:transform .12s,box-shadow .12s}.ev:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:5}.ev-t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ev-s{font-weight:300;color:var(--text-dim);font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-board{background:var(--board-dim);border-color:var(--board);color:#c4bcf5}.ev-pry{background:var(--pry-dim);border-color:var(--pry);color:#e8d89a}.ev-design{background:var(--design-dim);border-color:var(--design);color:#a4c1f7}.ev-yt{background:var(--yt-dim);border-color:var(--yt);color:#f5a8a8}.ev-live{background:var(--live-dim);border-color:var(--live);color:#ff9a9a}.ev-notify{background:var(--notify-dim);border-color:var(--notify);color:#f5d08a}.ev-off{background:var(--off-dim);border-color:var(--off);color:#555}.ev-rest{background:var(--rest-dim);border-color:var(--rest);color:var(--text-dim)}.ev-mtg{background:var(--mtg-dim);border-color:var(--mtg);color:#fbbf24}
.footer{text-align:center;padding:12px;font-size:9px;color:var(--text-dim);border-top:1px solid var(--border)}
.tt{display:none;position:fixed;background:#222228;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;z-index:100;max-width:260px;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none}.tt-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--pry);margin-bottom:3px}.tt-title{font-weight:600}.tt-note{font-size:10px;color:var(--text-dim)}
</style>
</head>
<body>
<div class="header">
  <h1>Shuto — 週間スケジュール</h1>
  <span class="ver">v10 — 2026/03/13</span>
</div>
<div class="nav">
  <a href="index.html">全体</a>
  <a href="shuto.html" class="active">Shuto</a>
  <a href="zastin.html">Zastin</a>
  <a href="issei.html">Issei</a>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--board)"></div>ボードワーク</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pry)"></div>PRY（撮影・ブレスト）</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--yt)"></div>UNI（ブレスト・調査・撮影）</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--design)"></div>個人ワーク</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--mtg)"></div>外部MTG</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--live)"></div>LIVE / 販売</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--notify)"></div>配信・告知</div>
</div>
<div class="container"><div class="timetable" id="timetable"></div></div>
<div class="footer">v10 — 2026/03/13　Shuto個人スケジュール</div>
<div class="tt" id="tt"><div class="tt-time" id="tt-time"></div><div class="tt-title" id="tt-title"></div><div class="tt-note" id="tt-note"></div></div>
<script>
const SH=8,EH=24,PX=38;
const days=[
  {n:'月',th:'スチール/ムービー + UNI + LIVE',c:'var(--pry)'},
  {n:'火',th:'ボードワーク + PRY撮影',c:'var(--pry)'},
  {n:'水',th:'個人ワーク（リモート）',c:'var(--design)'},
  {n:'木',th:'外部デザインMTG集約',c:'var(--mtg)'},
  {n:'金',th:'PRYブレスト + UNI',c:'var(--pry)'},
  {n:'土',th:'個人ワーク or イベント',c:'var(--design)'},
  {n:'日',th:'非稼働',c:'#555'},
];
const evs=[
  [ // Mon
    {s:8,e:14,t:'スチール/ムービー撮影',u:'角田さん or 平永さん（隔週ローテ）',c:'pry'},
    {s:12,e:15,t:'UNIブレスト/台本',u:'with zastin',c:'yt',l:'50%'},
    {s:14,e:15,t:'サンプル指示出し確認',u:'with issei',c:'pry',l:'50%'},
    {s:15,e:18,t:'UNI撮影',u:'with zastin',c:'yt'},
    {s:20.25,e:20.5,t:'📢 LINE配信',u:'LIVE&販売告知',c:'notify'},
    {s:20.5,e:21.33,t:'🔴 発売直前LIVE',u:'all',c:'live'},
    {s:21,e:22,t:'🔴 PRY新作発売',u:'1h限定受注',c:'live',l:'50%'},
    {s:22.33,e:23,t:'ボード再設計&後片付け',u:'all',c:'board'},
  ],
  [ // Tue
    {s:11,e:12,t:'ボードワーク',u:'一人',c:'board'},
    {s:12,e:16,t:'ボードワーク',u:'all',c:'board'},
    {s:18,e:21,t:'PRY撮影',u:'with zastin',c:'pry'},
  ],
  [ // Wed
    {s:10,e:21,t:'個人ワーク（リモート）',u:'デザイン',c:'design'},
    {s:19,e:19.5,t:'📢 UNI動画更新（YT）',u:'',c:'notify',l:'50%'},
  ],
  [ // Thu
    {s:8,e:9,t:'サムネチェック＆修正',u:'with zastin',c:'yt'},
    {s:9,e:10,t:'デザインボード＆チューニング',u:'all',c:'board'},
    {s:10,e:13,t:'SR MTG（対面）',u:'デザイン',c:'mtg'},
    {s:13,e:15,t:'CO MTG（対面）',u:'デザイン',c:'mtg'},
    {s:15,e:19,t:'業務委託MTG&ボード再設計',u:'with issei',c:'mtg'},
    {s:19,e:19.5,t:'📢 UNI動画更新（YT）',u:'',c:'notify'},
    {s:19,e:21,t:'全サムネ完成',u:'with zastin',c:'yt',l:'50%'},
  ],
  [ // Fri
    {s:9,e:13,t:'PRYブレスト・構成確定',u:'with zastin',c:'pry'},
    {s:14,e:16.5,t:'UNI市場環境調査',u:'with zastin',c:'yt'},
    {s:16.5,e:18,t:'UNIブレスト/台本',u:'with zastin',c:'yt'},
    {s:18,e:20,t:'UNI撮影',u:'with zastin',c:'yt'},
    {s:19,e:19.5,t:'📢 PRY動画更新（YT）',u:'',c:'pry',l:'50%'},
    {s:20,e:20.5,t:'📢 PRY新作ページ公開',u:'EC',c:'notify'},
  ],
  [ // Sat
    {s:10,e:21,t:'個人ワーク or イベント',u:'戦略&デザイン',c:'design'},
    {s:19,e:19.5,t:'📢 UNI動画更新（YT）',u:'',c:'notify',l:'50%'},
  ],
  [ // Sun
    {s:8,e:24,t:'非稼働',u:'予約配信のみ',c:'off'},
    {s:12,e:12.5,t:'📢 メルマガ配信',u:'予約',c:'notify',l:'50%'},
    {s:19,e:19.5,t:'📢 UNI動画更新（YT）',u:'予約',c:'notify',l:'50%'},
    {s:20,e:20.5,t:'📢 YTコミュニティ投稿',u:'予約',c:'notify',l:'50%'},
    {s:21,e:21.5,t:'📢 LINE配信',u:'予約',c:'notify',l:'50%'},
  ],
];
function fmt(h){const hh=Math.floor(h),mm=Math.round((h%1)*60);return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function build(){const tbl=document.getElementById('timetable');const totalH=EH-SH;const tc=document.createElement('div');tc.className='time-col';tc.style.height=(totalH*PX+40)+'px';tc.style.marginTop='40px';for(let h=SH;h<=EH;h++){const l=document.createElement('div');l.className='time-label';l.style.top=(h-SH)*PX+'px';l.textContent=(h===24?'00':String(h).padStart(2,'0'))+':00';tc.appendChild(l);}tbl.appendChild(tc);days.forEach((d,di)=>{const col=document.createElement('div');col.className='day-col';const hdr=document.createElement('div');hdr.className='day-hdr';hdr.innerHTML=`<div class="day-name" style="color:${d.c}">${d.n}</div><div class="day-theme">${d.th}</div>`;col.appendChild(hdr);const body=document.createElement('div');body.className='day-body';body.style.height=totalH*PX+'px';for(let h=0;h<=totalH;h++){const ln=document.createElement('div');ln.className='hline';ln.style.top=h*PX+'px';body.appendChild(ln);}(evs[di]||[]).forEach(ev=>{const el=document.createElement('div');el.className=`ev ev-${ev.c}`;const top=(ev.s-SH)*PX;const height=Math.max((ev.e-ev.s)*PX-2,14);el.style.top=top+'px';el.style.height=height+'px';if(ev.o)el.style.opacity=ev.o;if(ev.l)el.style.left=ev.l;el.innerHTML=`<div class="ev-t">${ev.t}</div>${height>20?`<div class="ev-s">${ev.u}</div>`:''}`;el.addEventListener('mouseenter',e=>{const tt=document.getElementById('tt');document.getElementById('tt-time').textContent=`${fmt(ev.s)} — ${fmt(ev.e)}`;document.getElementById('tt-title').textContent=ev.t.replace(/[📢🔴]\s?/g,'');document.getElementById('tt-note').textContent=ev.u||'';tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-8)+'px';});el.addEventListener('mouseleave',()=>{document.getElementById('tt').style.display='none';});el.addEventListener('mousemove',e=>{const tt=document.getElementById('tt');tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-8)+'px';});body.appendChild(el);});col.appendChild(body);tbl.appendChild(col);});}
build();
</script>
</body>
</html>
